name: Update Drift Calendar

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ics pyyaml python-dateutil requests

      - name: Build calendar
        run: python calendar_builder.py

      - name: Commit updated calendar
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add norcal_drift_calendar.ics
          git commit -m "Update drift calendar" || exit 0
          git push
