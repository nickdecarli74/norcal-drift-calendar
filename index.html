<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DriftCal</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:#020202;color:white;font-family:Arial,Helvetica,sans-serif}
.hero{min-height:100vh;padding:32px 22px 70px;background:radial-gradient(circle at center top,rgba(255,255,255,.08),transparent 38%),linear-gradient(#050505,#000)}
.nav{width:100%;max-width:1200px;margin:0 auto 70px;display:flex;justify-content:space-between;align-items:center}
.nav-logo{font-weight:900;font-style:italic;font-size:25px;letter-spacing:-1px}
.nav-logo span{color:#e10600}
.nav-links{display:flex;gap:40px;align-items:center}
.nav-links a{position:relative;color:white;text-decoration:none;font-size:14px;font-weight:900;letter-spacing:1px;transition:.25s;padding-bottom:6px}
.nav-links a:hover{color:#e10600;transform:translateY(-2px);text-shadow:0 0 14px rgba(225,6,0,.9)}
.nav-links a::after{content:"";position:absolute;left:0;bottom:0;width:0;height:2px;background:#e10600;transition:.25s}
.nav-links a:hover::after{width:100%}
.logo-wrap{text-align:center}
.main-logo{width:min(850px,96vw);display:block;margin:0 auto}
.tagline{margin-top:-10px;font-size:18px;letter-spacing:10px;color:#ddd;font-style:italic;text-align:center}
.subscribe{margin-top:36px;display:inline-block;background:#e10600;color:white;text-decoration:none;font-weight:900;font-size:18px;letter-spacing:1px;padding:18px 38px;border-radius:8px;box-shadow:0 0 35px rgba(225,6,0,.65);transition:.2s}
.subscribe:hover{transform:translateY(-3px);box-shadow:0 0 55px rgba(225,6,0,.9)}
.down{text-align:center;margin:42px 0 28px;color:#aaa;font-size:34px}
.event-card{width:min(900px,92vw);margin:0 auto;border:1px solid rgba(255,255,255,.13);border-top:4px solid #e10600;border-radius:16px;overflow:hidden;background:linear-gradient(90deg,rgba(0,0,0,.96),rgba(0,0,0,.78)),radial-gradient(circle at right,rgba(225,6,0,.2),transparent 45%);box-shadow:0 0 40px rgba(0,0,0,.85);transition:.25s}
.event-card:hover{transform:translateY(-4px);box-shadow:0 0 55px rgba(225,6,0,.18)}
.event-inner{display:grid;grid-template-columns:155px 1fr;gap:34px;padding:34px}
.next{color:#e10600;font-weight:900;letter-spacing:2px;font-size:13px;margin-bottom:22px}
.date{text-align:center;border-right:1px solid rgba(255,255,255,.18);padding-right:28px}
.month{font-size:26px;font-weight:900}
.day{font-size:76px;line-height:.9;font-weight:900}
.year{font-size:20px;font-weight:900;color:#bbb}
.event-title{font-size:38px;font-weight:900;font-style:italic;margin-bottom:18px}
.event-info{color:#ddd;line-height:1.9;font-size:18px}
.view-btn{margin-top:22px;display:inline-block;color:white;text-decoration:none;border:1px solid #e10600;border-radius:8px;padding:12px 22px;font-weight:900;letter-spacing:1px}
.section{width:min(1050px,92vw);margin:55px auto 0}
.section-title{font-size:24px;font-weight:900;letter-spacing:4px;margin-bottom:22px}
.upcoming-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px}
.small-card{border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:20px;background:rgba(255,255,255,.04);transition:.2s}
.small-card:hover{border-color:#e10600;transform:translateY(-3px)}
.small-date{color:#e10600;font-weight:900;margin-bottom:8px}
.small-title{font-weight:900;font-size:20px;font-style:italic;margin-bottom:8px}
.small-meta{color:#ccc;line-height:1.5;font-size:14px}
.calendar-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.cal-btn{background:#111;color:white;border:1px solid rgba(255,255,255,.18);padding:10px 14px;border-radius:8px;font-weight:900;cursor:pointer}
.cal-btn:hover{border-color:#e10600;color:#e10600}
.calendar-title{font-size:24px;font-weight:900;font-style:italic}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.weekday{color:#888;font-size:13px;font-weight:900;text-align:center;padding:8px}
.day-cell{min-height:95px;border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:10px;background:rgba(255,255,255,.03)}
.day-number{font-weight:900;color:#aaa;margin-bottom:8px}
.event-pill{display:block;background:#e10600;color:white;text-decoration:none;font-size:12px;font-weight:900;border-radius:7px;padding:6px;margin-top:6px;line-height:1.2}
.event-pill:hover{box-shadow:0 0 16px rgba(225,6,0,.75)}
.empty{opacity:.25}
footer{text-align:center;color:#666;padding:34px}
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.78);
  backdrop-filter:blur(6px);
  z-index:999;
  align-items:center;
  justify-content:center;
  padding:24px;
}

.modal-content{
  width:min(720px,94vw);
  background:linear-gradient(135deg,#090909,#000);
  border:1px solid rgba(255,255,255,.14);
  border-top:4px solid #e10600;
  border-radius:18px;
  padding:34px;
  box-shadow:0 0 60px rgba(225,6,0,.25);
  position:relative;
}

.modal-close{
  position:absolute;
  top:14px;
  right:18px;
  background:none;
  border:none;
  color:white;
  font-size:34px;
  cursor:pointer;
}

.modal-title{
  font-size:40px;
  font-weight:900;
  font-style:italic;
  margin-bottom:18px;
}

.modal-meta{
  color:#ddd;
  line-height:1.9;
  font-size:18px;
}

.modal-section{
  margin-top:26px;
  padding-top:20px;
  border-top:1px solid rgba(255,255,255,.12);
}

.modal-section h3{
  color:#e10600;
  margin-bottom:10px;
  letter-spacing:1px;
}

.modal-link{
  display:inline-block;
  margin-top:22px;
  background:#e10600;
  color:white;
  text-decoration:none;
  font-weight:900;
  padding:14px 22px;
  border-radius:8px;
}
@media(max-width:700px){
.nav-links{display:none}
.nav{margin-bottom:46px}
.tagline{font-size:13px;letter-spacing:4px;margin-top:8px}
.subscribe{font-size:15px;padding:16px 22px}
.event-inner{grid-template-columns:1fr}
.date{border-right:none;border-bottom:1px solid rgba(255,255,255,.18);padding-right:0;padding-bottom:22px}
.calendar-grid{gap:5px}
.day-cell{min-height:78px;padding:7px}
.event-pill{font-size:10px;padding:5px}
}
</style>
</head>

<body>

<section class="hero">
  <nav class="nav">
    <div class="nav-logo">DRIFT<span>CAL</span></div>
    <div class="nav-links">
      <a href="#events">EVENTS</a>
      <a href="#calendar">CALENDAR</a>
      <a href="#tracks">TRACKS</a>
      <a href="#media">MEDIA</a>
    </div>
  </nav>

  <div class="logo-wrap">
    <img class="main-logo" src="assets/driftcal-logo.png?v=10" alt="DriftCal Logo">
    <div class="tagline">NEVER MISS A DRIFT EVENT.</div>
    <a class="subscribe" href="webcal://nickdecarli74.github.io/norcal-drift-calendar/norcal_drift_calendar.ics">
      📅 SUBSCRIBE TO DRIFTCAL
    </a>
  </div>

  <div class="down">⌄</div>

  <div id="next-event" class="event-card"></div>

  <div id="events" class="section">
    <div class="section-title">UPCOMING EVENTS</div>
    <div id="upcoming-events" class="upcoming-grid"></div>
  </div>

  <div id="calendar" class="section">
    <div class="calendar-head">
      <button class="cal-btn" onclick="changeMonth(-1)">‹ PREV</button>
      <div id="calendar-title" class="calendar-title"></div>
      <button class="cal-btn" onclick="changeMonth(1)">NEXT ›</button>
    </div>
    <div id="calendar-grid" class="calendar-grid"></div>
  </div>
</section>
<div id="event-modal" class="modal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeEventModal()">×</button>
    <div id="modal-body"></div>
  </div>
</div>
<footer>
  © DriftCal
</footer>

<script>
let allEvents = [];
let calendarDate = new Date(2026, 6, 1);

function formatDateParts(dateStr){
  const d = new Date(dateStr.replace(" ", "T"));
  return {
    date: d,
    month: d.toLocaleString("en-US",{month:"short"}).toUpperCase(),
    day: d.getDate(),
    year: d.getFullYear(),
    full: d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})
  };
}

function eventUrl(e){
  return e.url || "#";
}

function renderNextEvent(events){
  const now = new Date();
  const upcoming = events.filter(e => new Date(e.start.replace(" ","T")) >= now);
  const next = upcoming.length ? upcoming[0] : events[0];

  if(!next){
    document.getElementById("next-event").innerHTML = "";
    return;
  }

  const p = formatDateParts(next.start);

  document.getElementById("next-event").innerHTML = `
    <div class="event-inner">
      <div class="date">
        <div class="next">NEXT EVENT</div>
        <div class="month">${p.month}</div>
        <div class="day">${p.day}</div>
        <div class="year">${p.year}</div>
      </div>
      <div>
        <div class="event-title">${next.title}</div>
        <div class="event-info">
          📍 ${next.location}<br>
          🏁 ${next.promoter}<br>
          🕘 ${p.full}
        </div>
        <a class="view-btn" href="${eventUrl(next)}" target="_blank">VIEW EVENT ›</a>
      </div>
    </div>
  `;
}

function renderUpcoming(events){
  const now = new Date();
  const upcoming = events
    .filter(e => new Date(e.start.replace(" ","T")) >= now)
    .slice(0, 8);

  document.getElementById("upcoming-events").innerHTML = upcoming.map(e => {
    const p = formatDateParts(e.start);
    return `
      <a class="small-card" href="${eventUrl(e)}" target="_blank" style="text-decoration:none;color:white">
        <div class="small-date">${p.full}</div>
        <div class="small-title">${e.title}</div>
        <div class="small-meta">
          ${e.promoter}<br>
          ${e.location}
        </div>
      </a>
    `;
  }).join("");
}

function renderCalendar(){
  const grid = document.getElementById("calendar-grid");
  const title = document.getElementById("calendar-title");

  const year = calendarDate.getFullYear();
  const month = calendarDate.getMonth();

  title.textContent = calendarDate.toLocaleString("en-US",{month:"long",year:"numeric"}).toUpperCase();

  const weekdays = ["SUN","MON","TUE","WED","THU","FRI","SAT"];
  let html = weekdays.map(d => `<div class="weekday">${d}</div>`).join("");

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  for(let i=0;i<firstDay;i++){
    html += `<div class="day-cell empty"></div>`;
  }

  for(let day=1;day<=daysInMonth;day++){
    const dateKey = `${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    const dayEvents = allEvents.filter(e => e.start.startsWith(dateKey));

    html += `
      <div class="day-cell">
        <div class="day-number">${day}</div>
        ${dayEvents.map(e => `<button class="event-pill" type="button" onclick="openEventModal('${e.id}')">${e.promoter}</button>`).join("")}
      </div>
    `;
  }

  grid.innerHTML = html;
}

function changeMonth(offset){
  calendarDate.setMonth(calendarDate.getMonth() + offset);
  renderCalendar();
}

function openEventModal(eventId){
  const e = allEvents.find(x => x.id === eventId);
  if(!e) return;

  const p = formatDateParts(e.start);

  document.getElementById("modal-body").innerHTML = `
    <div class="modal-title">${e.title}</div>
    <div class="modal-meta">
      📅 ${p.full}<br>
      📍 ${e.location}<br>
      🏁 ${e.promoter}
    </div>
    <div class="modal-section">
      <h3>EVENT NOTES</h3>
      <div class="modal-meta">${e.notes || "More details coming soon."}</div>
    </div>
    <div class="modal-section">
      <h3>MEDIA</h3>
      <div class="modal-meta">Photos and videos will be added after the event.</div>
    </div>
    <a class="modal-link" href="${eventUrl(e)}" target="_blank">REGISTRATION / INFO ›</a>
  `;

  document.getElementById("event-modal").style.display = "flex";
}

function closeEventModal(){
  document.getElementById("event-modal").style.display = "none";
}
  
fetch("events.json?v=" + Date.now())
  .then(res => res.json())
  .then(events => {
    allEvents = events.sort((a,b) => new Date(a.start.replace(" ","T")) - new Date(b.start.replace(" ","T")));

    const future = allEvents.find(e => new Date(e.start.replace(" ","T")) >= new Date());
    if(future){
      const d = new Date(future.start.replace(" ","T"));
      calendarDate = new Date(d.getFullYear(), d.getMonth(), 1);
    }

    renderNextEvent(allEvents);
    renderUpcoming(allEvents);
    renderCalendar();
  })
  .catch(() => {
    document.getElementById("next-event").innerHTML = "<div class='event-inner'>Could not load events.</div>";
  });
</script>

</body>
</html>
