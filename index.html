<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DriftCal</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at center, #333 0%, #050505 70%);
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .card {
      padding: 40px 24px;
      max-width: 420px;
    }
    h1 {
      font-size: 54px;
      margin: 0;
      letter-spacing: 2px;
      font-style: italic;
    }
    .cal {
      color: #e10600;
    }
    p {
      color: #ccc;
      font-size: 18px;
      margin: 16px 0 28px;
    }
    a.button {
      display: inline-block;
      background: #e10600;
      color: white;
      text-decoration: none;
      font-weight: bold;
      padding: 16px 24px;
      border-radius: 10px;
      font-size: 18px;
    }
    .small {
      margin-top: 20px;
      font-size: 13px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>DRIFT<span class="cal">CAL</span></h1>
    <p>Never miss a drift event.</p>

    <a class="button" href="webcal://nickdecarli74.github.io/norcal-drift-calendar/norcal_drift_calendar.ics">
      📅 Subscribe to Calendar
    </a>

    <div class="small">
      Works best on iPhone or Mac. If it does not open, copy the calendar link manually.
    </div>
  </div>
</body>
</html>
